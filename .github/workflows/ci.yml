name: Build and Test

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  LD_LIBRARY_PATH: ${{ github.workspace }}/core/zig-out/lib
  DYLD_LIBRARY_PATH: ${{ github.workspace }}/core/zig-out/lib

jobs:
  core-regression:
    name: Core regression
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Zig
        uses: ./.github/actions/setup-zig
        with:
          version: 0.16.0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Test Zig core
        run: zig build test
        working-directory: core
      - name: Build native library
        run: zig build
        working-directory: core
      - name: Run regression checks
        run: python tools/regression_checks.py
      - name: Run plugin integration checks
        run: python tools/plugin_integration_checks.py

  python-package-regression:
    name: Python package regression
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Zig
        uses: ./.github/actions/setup-zig
        with:
          version: 0.16.0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Build native library
        run: zig build
        working-directory: core
      - name: Install Python build tools
        run: python -m pip install -U build
      - name: Stage package assets
        run: python tools/stage_assets.py
      - name: Build Python wheel
        run: python -m build
        working-directory: bindings/python
      - name: Repair Linux wheel
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf
          python -m pip install auditwheel
          python -m auditwheel repair bindings/python/dist/*.whl -w bindings/python/wheelhouse
          rm bindings/python/dist/*.whl
          mv bindings/python/wheelhouse/*.whl bindings/python/dist/
      - name: Install Python wheel
        run: python -m pip install --force-reinstall bindings/python/dist/*.whl
        shell: bash
      - name: Regression test Python binding
        run: python -c "from nexaloid import Tokenizer; assert '/'.join(Tokenizer().lcut('南京市长江大桥')) == '南京市/长江大桥'"

  native-binding-regression:
    name: Native binding regression (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [c, cpp, zig]
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Zig
        uses: ./.github/actions/setup-zig
        with:
          version: 0.16.0
      - name: Build native library
        run: zig build
        working-directory: core
      - name: Regression test C binding
        if: matrix.language == 'c'
        run: |
          mkdir -p .zig-cache
          cc -std=c11 -Icore/include bindings/c/tests/regression.c -Lcore/zig-out/lib -lnexaloid -o .zig-cache/c-regression
          .zig-cache/c-regression
      - name: Regression test C++ binding
        if: matrix.language == 'cpp'
        run: |
          mkdir -p .zig-cache
          c++ -std=c++17 -Ibindings/cpp/include -Icore/include bindings/cpp/tests/regression.cpp -Lcore/zig-out/lib -lnexaloid -o .zig-cache/cpp-regression
          .zig-cache/cpp-regression
      - name: Regression test Zig binding
        if: matrix.language == 'zig'
        run: |
          zig build-exe bindings/zig/tests/regression.zig -Icore/include -Lcore/zig-out/lib -lnexaloid -lc
          ./regression

  rust-regression:
    name: Rust binding regression
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Zig
        uses: ./.github/actions/setup-zig
        with:
          version: 0.16.0
      - name: Set up Rust
        run: rustup toolchain install stable --profile minimal
      - name: Build native library
        run: zig build
        working-directory: core
      - name: Test Rust binding
        run: cargo test --manifest-path bindings/rust/nexaloid/Cargo.toml
        env:
          RUSTFLAGS: -L native=${{ github.workspace }}/core/zig-out/lib

  go-regression:
    name: Go binding regression
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Zig
        uses: ./.github/actions/setup-zig
        with:
          version: 0.16.0
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.22"
      - name: Build native library
        run: zig build
        working-directory: core
      - name: Test Go binding
        run: go test ./nexaloid
        working-directory: bindings/go

  node-package-regression:
    name: Node.js package regression
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Zig
        uses: ./.github/actions/setup-zig
        with:
          version: 0.16.0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          package-manager-cache: false
      - name: Build native library
        run: zig build
        working-directory: core
      - name: Build Node.js addon
        run: npm run build
        working-directory: bindings/node
      - name: Stage Node.js prebuild
        run: python tools/stage_assets.py --node-addon
      - name: Check npm package contents
        run: npm pack --dry-run
        working-directory: bindings/node
      - name: Regression test Node.js binding
        run: npm run test:binding
        working-directory: bindings/node
      - name: Regression test packed npm package
        run: python tools/npm_package_regression.py

  python-versions:
    name: Python ${{ matrix.python }} compatibility
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        python: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Zig
        uses: ./.github/actions/setup-zig
        with:
          version: 0.16.0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - name: Build native library
        run: zig build
        working-directory: core
      - name: Install Python build tools
        run: python -m pip install -U build
      - name: Stage package assets
        run: python tools/stage_assets.py
      - name: Build Python wheel
        run: python -m build --wheel
        working-directory: bindings/python
      - name: Repair Linux wheel
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf
          python -m pip install auditwheel
          python -m auditwheel repair bindings/python/dist/*.whl -w bindings/python/wheelhouse
          rm bindings/python/dist/*.whl
          mv bindings/python/wheelhouse/*.whl bindings/python/dist/
      - name: Install Python wheel
        run: python -m pip install --force-reinstall bindings/python/dist/*.whl
        shell: bash
      - name: Regression test Python binding
        run: python -c "from nexaloid import Tokenizer; assert '/'.join(Tokenizer().lcut('南京市长江大桥')) == '南京市/长江大桥'"

  node-versions:
    name: Node.js ${{ matrix.node }} compatibility
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22, 24]
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Zig
        uses: ./.github/actions/setup-zig
        with:
          version: 0.16.0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          package-manager-cache: false
      - name: Build native library
        run: zig build
        working-directory: core
      - name: Build Node.js addon
        run: npm run build
        working-directory: bindings/node
      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf
      - name: Stage Node.js prebuild
        run: python tools/stage_assets.py --node-addon
      - name: Regression test Node.js binding
        run: npm run test:binding
        working-directory: bindings/node
      - name: Regression test packed npm package
        run: python tools/npm_package_regression.py
