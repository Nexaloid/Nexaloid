name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  package-smoke:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
          - os: windows-latest
            platform: windows-x64
          - os: macos-15-intel
            platform: darwin-x64
          - os: macos-latest
            platform: darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: actions/setup-go@v6
        with:
          go-version: "1.22"
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          package-manager-cache: false
      - run: rustup toolchain install stable --profile minimal
      - run: zig build test
        working-directory: core
      - run: zig build
        working-directory: core
      - run: python -c "import os, pathlib; root=pathlib.Path(os.environ['GITHUB_WORKSPACE']); pathlib.Path(os.environ['GITHUB_PATH']).open('a', encoding='utf-8').write(str(root/'core/zig-out/bin') + '\\n'); pathlib.Path(os.environ['GITHUB_ENV']).open('a', encoding='utf-8').write(f\"LD_LIBRARY_PATH={root/'core/zig-out/lib'}\\nDYLD_LIBRARY_PATH={root/'core/zig-out/lib'}\\n\")"
      - run: python -m pip install -U build
      - run: python tools/stage_assets.py
      - run: python -m build
        working-directory: bindings/python
      - if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf
          python -m pip install auditwheel
          python -m auditwheel repair bindings/python/dist/*.whl -w bindings/python/wheelhouse
          rm bindings/python/dist/*.whl
          mv bindings/python/wheelhouse/*.whl bindings/python/dist/
      - run: python -m pip install --force-reinstall bindings/python/dist/*.whl
        shell: bash
      - run: python -c "from nexaloid import Tokenizer; assert '/'.join(Tokenizer().lcut('南京市长江大桥')) == '南京市/长江大桥'"
      - run: cargo test --manifest-path bindings/rust/nexaloid/Cargo.toml
        env:
          RUSTFLAGS: -L native=${{ github.workspace }}/core/zig-out/lib
      - run: go test ./nexaloid
        working-directory: bindings/go
      - run: npm run build
        working-directory: bindings/node
      - run: python tools/stage_assets.py --node-addon
      - run: npm pack --dry-run
        working-directory: bindings/node
      - run: npm run smoke
        working-directory: bindings/node
      - run: python tools/smoke_npm_package.py

  python-versions:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - run: zig build
        working-directory: core
      - run: python -m pip install -U build
      - run: python tools/stage_assets.py
      - run: python -m build --wheel
        working-directory: bindings/python
      - run: |
          sudo apt-get update
          sudo apt-get install -y patchelf
          python -m pip install auditwheel
          python -m auditwheel repair bindings/python/dist/*.whl -w bindings/python/wheelhouse
          rm bindings/python/dist/*.whl
          mv bindings/python/wheelhouse/*.whl bindings/python/dist/
      - run: python -m pip install --force-reinstall bindings/python/dist/*.whl
        shell: bash
      - run: python -c "from nexaloid import Tokenizer; assert '/'.join(Tokenizer().lcut('南京市长江大桥')) == '南京市/长江大桥'"

  node-versions:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22, 24]
    steps:
      - uses: actions/checkout@v6
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          package-manager-cache: false
      - run: zig build
        working-directory: core
      - run: npm run build
        working-directory: bindings/node
      - run: python tools/stage_assets.py --node-addon
      - run: npm run smoke
        working-directory: bindings/node
      - run: python tools/smoke_npm_package.py
