name: Build and Test

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  package-smoke:
    name: Package smoke (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.22"
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          package-manager-cache: false
      - name: Set up Rust
        run: rustup toolchain install stable --profile minimal
      - name: Test Zig core
        run: zig build test
        working-directory: core
      - name: Build native library
        run: zig build
        working-directory: core
      - name: Export native library paths
        shell: bash
        run: |
          python - <<'PY'
          import os
          import pathlib

          root = pathlib.Path(os.environ["GITHUB_WORKSPACE"])
          pathlib.Path(os.environ["GITHUB_PATH"]).open("a", encoding="utf-8").write(str(root / "core/zig-out/bin") + "\n")
          pathlib.Path(os.environ["GITHUB_ENV"]).open("a", encoding="utf-8").write(
              f"LD_LIBRARY_PATH={root / 'core/zig-out/lib'}\n"
              f"DYLD_LIBRARY_PATH={root / 'core/zig-out/lib'}\n"
          )
          PY
      - name: Install Python build tools
        run: python -m pip install -U build
      - name: Stage package assets
        run: python tools/stage_assets.py
      - name: Build Python wheel
        run: python -m build
        working-directory: bindings/python
      - name: Repair Linux wheel
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf
          python -m pip install auditwheel
          python -m auditwheel repair bindings/python/dist/*.whl -w bindings/python/wheelhouse
          rm bindings/python/dist/*.whl
          mv bindings/python/wheelhouse/*.whl bindings/python/dist/
      - name: Install Python wheel
        run: python -m pip install --force-reinstall bindings/python/dist/*.whl
        shell: bash
      - name: Smoke test Python binding
        run: python -c "from nexaloid import Tokenizer; assert '/'.join(Tokenizer().lcut('南京市长江大桥')) == '南京市/长江大桥'"
      - name: Run regression checks
        run: python tools/regression_checks.py
      - name: Test Rust binding
        run: cargo test --manifest-path bindings/rust/nexaloid/Cargo.toml
        env:
          RUSTFLAGS: -L native=${{ github.workspace }}/core/zig-out/lib
      - name: Test Go binding
        run: go test ./nexaloid
        working-directory: bindings/go
      - name: Build Node.js addon
        run: npm run build
        working-directory: bindings/node
      - name: Stage Node.js prebuild
        run: python tools/stage_assets.py --node-addon
      - name: Check npm package contents
        run: npm pack --dry-run
        working-directory: bindings/node
      - name: Smoke test Node.js binding
        run: npm run smoke
        working-directory: bindings/node
      - name: Smoke test packed npm package
        run: python tools/smoke_npm_package.py

  python-versions:
    name: Python ${{ matrix.python }} compatibility
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        python: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - name: Build native library
        run: zig build
        working-directory: core
      - name: Install Python build tools
        run: python -m pip install -U build
      - name: Stage package assets
        run: python tools/stage_assets.py
      - name: Build Python wheel
        run: python -m build --wheel
        working-directory: bindings/python
      - name: Repair Linux wheel
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf
          python -m pip install auditwheel
          python -m auditwheel repair bindings/python/dist/*.whl -w bindings/python/wheelhouse
          rm bindings/python/dist/*.whl
          mv bindings/python/wheelhouse/*.whl bindings/python/dist/
      - name: Install Python wheel
        run: python -m pip install --force-reinstall bindings/python/dist/*.whl
        shell: bash
      - name: Smoke test Python binding
        run: python -c "from nexaloid import Tokenizer; assert '/'.join(Tokenizer().lcut('南京市长江大桥')) == '南京市/长江大桥'"

  node-versions:
    name: Node.js ${{ matrix.node }} compatibility
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22, 24]
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          package-manager-cache: false
      - name: Build native library
        run: zig build
        working-directory: core
      - name: Build Node.js addon
        run: npm run build
        working-directory: bindings/node
      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf
      - name: Stage Node.js prebuild
        run: python tools/stage_assets.py --node-addon
      - name: Smoke test Node.js binding
        run: npm run smoke
        working-directory: bindings/node
      - name: Smoke test packed npm package
        run: python tools/smoke_npm_package.py
