name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - uses: actions/setup-go@v6
        with:
          go-version: "1.22"
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false
      - run: rustup toolchain install stable --profile minimal
      - run: zig build test
        working-directory: core
      - run: zig build
        working-directory: core
      - run: python -m pip install -U build
      - run: python -m build
        working-directory: bindings/python
      - run: cargo test --manifest-path bindings/rust/nexaloid/Cargo.toml
        env:
          RUSTFLAGS: -L native=${{ github.workspace }}/core/zig-out/lib
          LD_LIBRARY_PATH: ${{ github.workspace }}/core/zig-out/lib
      - run: go test ./nexaloid
        working-directory: bindings/go
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/core/zig-out/lib
      - run: npm pack --dry-run
        working-directory: bindings/node
      - run: npm run build
        working-directory: bindings/node
      - run: npm run smoke
        working-directory: bindings/node
