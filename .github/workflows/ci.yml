name: Build and Test

on:
  workflow_dispatch:
  pull_request:
    paths-ignore:
      - "README.md"
      - "README.zh-CN.md"
      - "docs/**"
  push:
    branches:
      - main
    paths-ignore:
      - "README.md"
      - "README.zh-CN.md"
      - "docs/**"

permissions:
  contents: read

env:
  LD_LIBRARY_PATH: ${{ github.workspace }}/core/zig-out/lib
  DYLD_LIBRARY_PATH: ${{ github.workspace }}/core/zig-out/lib

jobs:
  core-regression:
    name: Core regression
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Zig
        uses: ./.github/actions/setup-zig
        with:
          version: 0.16.0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Test Zig core
        run: zig build test
        working-directory: core
      - name: Build native library
        run: zig build -Doptimize=ReleaseFast
        working-directory: core
      - name: Build HMM plugin
        run: |
          zig build-lib -dynamic -lc --name nexaloid_plugin_hmm_lattice tools/hmm_lattice_plugin.zig
          mkdir -p core/zig-out/lib
          cp libnexaloid_plugin_hmm_lattice.so core/zig-out/lib/nexaloid_plugin_hmm_lattice.so
        shell: bash
      - name: Run regression checks
        run: python tools/regression_checks.py
      - name: Run plugin integration checks
        run: python tools/plugin_integration_checks.py

  python-package-regression:
    name: Python package regression (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
            zig_target: x86_64-linux-gnu
          - os: ubuntu-24.04-arm
            platform: linux-arm64
            zig_target: aarch64-linux-gnu
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Zig
        uses: ./.github/actions/setup-zig
        with:
          version: 0.16.0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Build native library
        run: zig build -Doptimize=ReleaseFast -Dtarget=${{ matrix.zig_target }}
        working-directory: core
      - name: Build HMM plugin
        run: |
          zig build-lib -dynamic -lc --name nexaloid_plugin_hmm_lattice tools/hmm_lattice_plugin.zig
          mkdir -p core/zig-out/lib
          cp libnexaloid_plugin_hmm_lattice.so core/zig-out/lib/nexaloid_plugin_hmm_lattice.so
        shell: bash
      - name: Install Python build tools
        run: python -m pip install -U build
      - name: Stage package assets
        run: python tools/stage_assets.py
      - name: Build Python wheel
        run: python -m build
        working-directory: bindings/python
      - name: Repair Linux wheel
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf
          python -m pip install auditwheel
          python -m auditwheel repair bindings/python/dist/*.whl -w bindings/python/wheelhouse
          rm bindings/python/dist/*.whl
          mv bindings/python/wheelhouse/*.whl bindings/python/dist/
      - name: Install Python wheel
        run: python -m pip install --force-reinstall bindings/python/dist/*.whl
        shell: bash
      - name: Regression test Python binding
        run: python -c "from nexaloid import Tokenizer; t=Tokenizer(); assert '/'.join(t.lcut('南京市长江大桥')) == '南京市/长江大桥'; assert t.lcut('小明硕士毕业', HMM=True) == ['小明', '硕士', '毕业']; t.close()"

  native-binding-regression:
    name: Native binding regression (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [c, cpp, zig]
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Zig
        uses: ./.github/actions/setup-zig
        with:
          version: 0.16.0
      - name: Build native library
        run: zig build -Doptimize=ReleaseFast
        working-directory: core
      - name: Regression test native binding
        shell: bash
        run: |
          mkdir -p .zig-cache
          case "${{ matrix.language }}" in
            c)
              cc -std=c11 -Icore/include bindings/c/tests/regression.c -Lcore/zig-out/lib -lnexaloid -o .zig-cache/c-regression
              .zig-cache/c-regression
              ;;
            cpp)
              c++ -std=c++17 -Ibindings/cpp/include -Icore/include bindings/cpp/tests/regression.cpp -Lcore/zig-out/lib -lnexaloid -o .zig-cache/cpp-regression
              .zig-cache/cpp-regression
              ;;
            zig)
              (cd bindings/zig && zig build regression)
              ;;
          esac

  rust-regression:
    name: Rust binding regression
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Zig
        uses: ./.github/actions/setup-zig
        with:
          version: 0.16.0
      - name: Set up Rust
        run: rustup toolchain install stable --profile minimal
      - name: Build native library
        run: zig build -Doptimize=ReleaseFast
        working-directory: core
      - name: Test Rust binding
        run: cargo test --manifest-path bindings/rust/nexaloid/Cargo.toml
        env:
          RUSTFLAGS: -L native=${{ github.workspace }}/core/zig-out/lib

  go-regression:
    name: Go binding regression
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Zig
        uses: ./.github/actions/setup-zig
        with:
          version: 0.16.0
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.22"
      - name: Build native library
        run: zig build -Doptimize=ReleaseFast
        working-directory: core
      - name: Test Go binding
        run: go test ./nexaloid
        working-directory: bindings/go

  node-package-regression:
    name: Node.js package regression (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
            zig_target: x86_64-linux-gnu
          - os: ubuntu-24.04-arm
            platform: linux-arm64
            zig_target: aarch64-linux-gnu
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Zig
        uses: ./.github/actions/setup-zig
        with:
          version: 0.16.0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          package-manager-cache: false
      - name: Build native library
        run: zig build -Doptimize=ReleaseFast -Dtarget=${{ matrix.zig_target }}
        working-directory: core
      - name: Build Node.js addon
        run: npm run build
        working-directory: bindings/node
      - name: Stage Node.js prebuild
        run: python tools/stage_assets.py --node-addon
      - name: Check npm package contents
        run: npm pack --dry-run
        working-directory: bindings/node
      - name: Regression test Node.js binding
        run: npm run test:binding
        working-directory: bindings/node
      - name: Regression test packed npm package
        run: python tools/npm_package_regression.py

  native-sdk-cross-build:
    name: Native SDK cross-build (${{ matrix.target.platform }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - platform: linux-x64
            zig_target: x86_64-linux-gnu
          - platform: windows-x64
            zig_target: x86_64-windows-gnu
          - platform: darwin-x64
            zig_target: x86_64-macos
          - platform: darwin-arm64
            zig_target: aarch64-macos
          - platform: linux-arm64
            zig_target: aarch64-linux-gnu
          - platform: windows-arm64
            zig_target: aarch64-windows-gnu
          - platform: linux-musl
            zig_target: x86_64-linux-musl
          - platform: linux-armv7
            zig_target: arm-linux-gnueabihf
          - platform: riscv64
            zig_target: riscv64-linux-gnu
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Zig
        uses: ./.github/actions/setup-zig
        with:
          version: 0.16.0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Cross-build native library
        run: zig build -Doptimize=ReleaseFast -Dtarget=${{ matrix.target.zig_target }}
        working-directory: core
      - name: Cross-build HMM plugin
        run: |
          rm -f *nexaloid_plugin_hmm_lattice*
          zig build-lib -dynamic -lc --name nexaloid_plugin_hmm_lattice -target "${{ matrix.target.zig_target }}" tools/hmm_lattice_plugin.zig
          mkdir -p core/zig-out/lib
          case "${{ matrix.target.platform }}" in
            windows-*) cp nexaloid_plugin_hmm_lattice.dll core/zig-out/lib/nexaloid_plugin_hmm_lattice.dll ;;
            darwin-*) cp libnexaloid_plugin_hmm_lattice.dylib core/zig-out/lib/nexaloid_plugin_hmm_lattice.dylib ;;
            *) cp libnexaloid_plugin_hmm_lattice.so core/zig-out/lib/nexaloid_plugin_hmm_lattice.so ;;
          esac
        shell: bash
      - name: Package native SDK
        run: python tools/package_native_sdk.py --version 0.0.0-ci --platform ${{ matrix.target.platform }} --language all --out-dir dist/native-ci

  linux-qemu-runtime-regression:
    name: Linux QEMU runtime regression (${{ matrix.target.platform }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - platform: linux-arm64
            zig_target: aarch64-linux-gnu
            qemu: qemu-aarch64-static
            qemu_prefix: /usr/aarch64-linux-gnu
            packages: qemu-user-static gcc-aarch64-linux-gnu
          - platform: linux-armv7
            zig_target: arm-linux-gnueabihf
            qemu: qemu-arm-static
            qemu_prefix: /usr/arm-linux-gnueabihf
            packages: qemu-user-static gcc-arm-linux-gnueabihf
          - platform: riscv64
            zig_target: riscv64-linux-gnu
            qemu: qemu-riscv64-static
            qemu_prefix: /usr/riscv64-linux-gnu
            packages: qemu-user-static gcc-riscv64-linux-gnu
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Zig
        uses: ./.github/actions/setup-zig
        with:
          version: 0.16.0
      - name: Install QEMU runtime
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.target.packages }}
      - name: Cross-build native library
        run: zig build -Doptimize=ReleaseFast -Dtarget=${{ matrix.target.zig_target }}
        working-directory: core
      - name: Cross-build C regression
        run: |
          mkdir -p .zig-cache/qemu
          zig cc -target ${{ matrix.target.zig_target }} -std=c11 -Icore/include bindings/c/tests/regression.c -Lcore/zig-out/lib -lnexaloid -o .zig-cache/qemu/c-regression
      - name: Run C regression under QEMU
        run: |
          LD_LIBRARY_PATH="$PWD/core/zig-out/lib" \
            ${{ matrix.target.qemu }} -L ${{ matrix.target.qemu_prefix }} .zig-cache/qemu/c-regression

  python-versions:
    name: Python ${{ matrix.python }} compatibility
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        python: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Zig
        uses: ./.github/actions/setup-zig
        with:
          version: 0.16.0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - name: Build native library
        run: zig build -Doptimize=ReleaseFast
        working-directory: core
      - name: Install Python build tools
        run: python -m pip install -U build
      - name: Stage package assets
        run: python tools/stage_assets.py
      - name: Build Python wheel
        run: python -m build --wheel
        working-directory: bindings/python
      - name: Repair Linux wheel
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf
          python -m pip install auditwheel
          python -m auditwheel repair bindings/python/dist/*.whl -w bindings/python/wheelhouse
          rm bindings/python/dist/*.whl
          mv bindings/python/wheelhouse/*.whl bindings/python/dist/
      - name: Install Python wheel
        run: python -m pip install --force-reinstall bindings/python/dist/*.whl
        shell: bash
      - name: Regression test Python binding
        run: python -c "from nexaloid import Tokenizer; t=Tokenizer(); assert '/'.join(t.lcut('南京市长江大桥')) == '南京市/长江大桥'; assert t.lcut('小明硕士毕业', HMM=True) == ['小明', '硕士', '毕业']; t.close()"

  node-versions:
    name: Node.js ${{ matrix.node }} compatibility
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22, 24]
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Zig
        uses: ./.github/actions/setup-zig
        with:
          version: 0.16.0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          package-manager-cache: false
      - name: Build native library
        run: zig build -Doptimize=ReleaseFast
        working-directory: core
      - name: Build Node.js addon
        run: npm run build
        working-directory: bindings/node
      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf
      - name: Stage Node.js prebuild
        run: python tools/stage_assets.py --node-addon
      - name: Regression test Node.js binding
        run: npm run test:binding
        working-directory: bindings/node
      - name: Regression test packed npm package
        run: python tools/npm_package_regression.py
