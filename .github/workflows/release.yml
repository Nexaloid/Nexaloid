name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 0.1.1 or 0.1.1-alpha.1"
        required: true
        type: string
      publish_pypi:
        description: "Publish PyPI"
        type: boolean
        default: true
      publish_cargo:
        description: "Publish Cargo"
        type: boolean
        default: true
      publish_npm:
        description: "Publish npm"
        type: boolean
        default: true
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  pypi-build:
    if: github.event_name != 'workflow_dispatch' || inputs.publish_pypi
    strategy:
      fail-fast: false
      matrix:
        python: ["3.9", "3.10", "3.11", "3.12", "3.13"]
        target:
          - os: ubuntu-latest
            platform: linux-x64
          - os: windows-latest
            platform: windows-x64
          - os: macos-15-intel
            platform: darwin-x64
          - os: macos-latest
            platform: darwin-arm64
    runs-on: ${{ matrix.target.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - run: python ${{ github.workspace }}/tools/set_release_version.py "${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}"
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - run: zig build
        working-directory: ${{ github.workspace }}/core
      - run: python -m pip install -U build
      - run: python ${{ github.workspace }}/tools/stage_assets.py
      - run: python -m build --wheel
        working-directory: bindings/python
      - if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf
          python -m pip install auditwheel
          python -m auditwheel repair bindings/python/dist/*.whl -w bindings/python/wheelhouse
          rm bindings/python/dist/*.whl
          mv bindings/python/wheelhouse/*.whl bindings/python/dist/
      - run: python -m pip install --force-reinstall bindings/python/dist/*.whl
        shell: bash
      - run: python -c "from nexaloid import Tokenizer; assert '/'.join(Tokenizer().lcut('南京市长江大桥')) == '南京市/长江大桥'"
      - uses: actions/upload-artifact@v6
        with:
          name: pypi-${{ matrix.target.platform }}-py${{ matrix.python }}
          path: bindings/python/dist/*

  pypi:
    if: github.event_name != 'workflow_dispatch' || inputs.publish_pypi
    runs-on: ubuntu-latest
    needs: pypi-build
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v6
        with:
          pattern: pypi-*
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

  cargo-native-build:
    if: github.event_name != 'workflow_dispatch' || inputs.publish_cargo
    strategy:
      fail-fast: false
      matrix:
        target:
          - os: ubuntu-latest
            platform: linux-x64
          - os: windows-latest
            platform: windows-x64
          - os: macos-15-intel
            platform: darwin-x64
          - os: macos-latest
            platform: darwin-arm64
    runs-on: ${{ matrix.target.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - run: python tools/set_release_version.py "${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}"
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - run: zig build
        working-directory: ${{ github.workspace }}/core
      - run: python tools/stage_assets.py
      - uses: actions/upload-artifact@v6
        with:
          name: cargo-native-${{ matrix.target.platform }}
          path: bindings/rust/nexaloid-sys/native

  cargo:
    if: github.event_name != 'workflow_dispatch' || inputs.publish_cargo
    runs-on: ubuntu-latest
    needs: cargo-native-build
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - run: python tools/set_release_version.py "${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}"
      - uses: actions/download-artifact@v6
        with:
          pattern: cargo-native-*
          path: bindings/rust/nexaloid-sys/native
          merge-multiple: true
      - run: rustup toolchain install stable --profile minimal
      - run: cargo publish --allow-dirty --manifest-path bindings/rust/nexaloid-sys/Cargo.toml
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - run: sleep 30
      - run: cargo publish --allow-dirty --manifest-path bindings/rust/nexaloid/Cargo.toml
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  npm-build:
    if: github.event_name != 'workflow_dispatch' || inputs.publish_npm
    strategy:
      fail-fast: false
      matrix:
        target:
          - os: ubuntu-latest
            platform: linux-x64
          - os: windows-latest
            platform: windows-x64
          - os: macos-15-intel
            platform: darwin-x64
          - os: macos-latest
            platform: darwin-arm64
    runs-on: ${{ matrix.target.os }}
    defaults:
      run:
        working-directory: bindings/node
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - run: python ${{ github.workspace }}/tools/set_release_version.py "${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}"
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - run: zig build
        working-directory: ${{ github.workspace }}/core
      - run: npm run build
      - if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf
        working-directory: ${{ github.workspace }}
      - run: python ${{ github.workspace }}/tools/stage_assets.py --node-addon
      - run: npm run smoke
      - uses: actions/upload-artifact@v6
        with:
          name: npm-${{ matrix.target.platform }}
          path: bindings/node/prebuilds

  npm:
    if: github.event_name != 'workflow_dispatch' || inputs.publish_npm
    runs-on: ubuntu-latest
    needs: npm-build
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: bindings/node
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v6
        with:
          pattern: npm-*
          path: bindings/node/prebuilds
          merge-multiple: true
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - run: python ${{ github.workspace }}/tools/set_release_version.py "${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}"
      - run: python -c "import shutil, pathlib; root=pathlib.Path('${{ github.workspace }}'); dst=root/'bindings/node/data/dict'; dst.mkdir(parents=True, exist_ok=True); [shutil.copy2(root/'data/dict'/n, dst/n) for n in ('nexaloid.tsv', 'nexaloid.nxdict')]"
        working-directory: ${{ github.workspace }}
      - run: npm pack --dry-run
      - run: npm run smoke
      - run: python ${{ github.workspace }}/tools/smoke_npm_package.py
      - run: npm publish --provenance --access public

  release-summary:
    runs-on: ubuntu-latest
    if: always()
    needs: [pypi, cargo, npm]
    steps:
      - run: |
          {
            echo "## Release summary"
            echo ""
            echo "| Channel | Result |"
            echo "|---|---|"
            echo "| PyPI | ${{ needs.pypi.result }} |"
            echo "| Cargo | ${{ needs.cargo.result }} |"
            echo "| npm | ${{ needs.npm.result }} |"
          } >> "$GITHUB_STEP_SUMMARY"
