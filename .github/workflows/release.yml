name: Publish Packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 0.1.1 or 0.1.1-alpha.1"
        required: true
        type: string
      publish_pypi:
        description: "Publish PyPI"
        type: boolean
        default: true
      publish_cargo:
        description: "Publish Cargo"
        type: boolean
        default: true
      publish_npm:
        description: "Publish npm"
        type: boolean
        default: true
      publish_native_sdk:
        description: "Publish GitHub native SDK assets"
        type: boolean
        default: true
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  ci_gate:
    name: CI gate
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Zig
        uses: ./.github/actions/setup-zig
        with:
          version: 0.16.0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Test Zig core
        run: zig build test
        working-directory: core
      - name: Build native library
        run: zig build -Doptimize=ReleaseFast
        working-directory: core
      - name: Run regression checks
        run: python tools/regression_checks.py
      - name: Run plugin integration checks
        run: python tools/plugin_integration_checks.py

  pypi-build:
    name: Build PyPI wheel (${{ matrix.target.platform }}, Python ${{ matrix.python }})
    if: github.event_name != 'workflow_dispatch' || inputs.publish_pypi
    needs: ci_gate
    strategy:
      fail-fast: false
      matrix:
        python: ["3.9", "3.10", "3.11", "3.12", "3.13"]
        target: &release-targets
          - os: ubuntu-latest
            platform: linux-x64
            pyplat: ""
            zig_target: x86_64-linux-gnu
          - os: ubuntu-24.04-arm
            platform: linux-arm64
            pyplat: ""
            zig_target: aarch64-linux-gnu
          - os: windows-latest
            platform: windows-x64
            pyplat: win_amd64
          - os: macos-15-intel
            platform: darwin-x64
            pyplat: macosx_15_0_x86_64
          - os: macos-15
            platform: darwin-arm64
            pyplat: macosx_15_0_arm64
    runs-on: ${{ matrix.target.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - name: Set release version
        run: python ${{ github.workspace }}/tools/set_release_version.py "${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}"
      - name: Set up Zig
        uses: ./.github/actions/setup-zig
        with:
          version: 0.16.0
      - name: Build native library
        if: runner.os == 'Linux'
        run: zig build -Doptimize=ReleaseFast -Dtarget=${{ matrix.target.zig_target }}
        working-directory: ${{ github.workspace }}/core
      - name: Build native library
        if: runner.os != 'Linux'
        run: zig build -Doptimize=ReleaseFast
        working-directory: ${{ github.workspace }}/core
      - name: Install Python build tools
        run: python -m pip install -U build
      - name: Stage package assets
        run: python ${{ github.workspace }}/tools/stage_assets.py
      - name: Build Python wheel
        if: matrix.target.pyplat == ''
        run: python -m build --wheel
        working-directory: bindings/python
      - name: Build platform-tagged Python wheel
        if: matrix.target.pyplat != ''
        run: python -m build --wheel -C--build-option=--plat-name=${{ matrix.target.pyplat }}
        working-directory: bindings/python
      - name: Repair Linux wheel
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf
          python -m pip install auditwheel
          python -m auditwheel repair bindings/python/dist/*.whl -w bindings/python/wheelhouse
          rm bindings/python/dist/*.whl
          mv bindings/python/wheelhouse/*.whl bindings/python/dist/
      - name: Install Python wheel
        run: python -m pip install --force-reinstall bindings/python/dist/*.whl
        shell: bash
      - name: Regression test Python binding
        run: python -c "from nexaloid import Tokenizer; assert '/'.join(Tokenizer().lcut('南京市长江大桥')) == '南京市/长江大桥'"
      - name: Upload PyPI wheel
        uses: actions/upload-artifact@v6
        with:
          name: pypi-${{ matrix.target.platform }}-py${{ matrix.python }}
          path: bindings/python/dist/*

  pypi:
    name: Publish PyPI
    if: github.event_name != 'workflow_dispatch' || inputs.publish_pypi
    runs-on: ubuntu-latest
    needs: pypi-build
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download PyPI wheels
        uses: actions/download-artifact@v7
        with:
          pattern: pypi-*
          path: dist
          merge-multiple: true
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true

  native-sdk-build:
    name: Build native SDK (${{ matrix.target.platform }})
    if: github.event_name != 'workflow_dispatch' || inputs.publish_native_sdk
    needs: ci_gate
    strategy:
      fail-fast: false
      matrix:
        target:
          - os: ubuntu-latest
            platform: linux-x64
            zig_target: x86_64-linux-gnu
          - os: ubuntu-latest
            platform: windows-x64
            zig_target: x86_64-windows-gnu
          - os: ubuntu-latest
            platform: darwin-x64
            zig_target: x86_64-macos
          - os: ubuntu-latest
            platform: darwin-arm64
            zig_target: aarch64-macos
          - os: ubuntu-latest
            platform: linux-arm64
            zig_target: aarch64-linux-gnu
          - os: ubuntu-latest
            platform: windows-arm64
            zig_target: aarch64-windows-gnu
          - os: ubuntu-latest
            platform: linux-musl
            zig_target: x86_64-linux-musl
          - os: ubuntu-latest
            platform: linux-armv7
            zig_target: arm-linux-gnueabihf
          - os: ubuntu-latest
            platform: riscv64
            zig_target: riscv64-linux-gnu
    runs-on: ${{ matrix.target.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Set up Zig
        uses: ./.github/actions/setup-zig
        with:
          version: 0.16.0
      - name: Build native library
        run: zig build -Doptimize=ReleaseFast -Dtarget=${{ matrix.target.zig_target }}
        working-directory: ${{ github.workspace }}/core
      - name: Build HMM plugin
        shell: bash
        run: |
          rm -f *nexaloid_plugin_hmm_lattice*
          zig build-lib -dynamic -lc --name nexaloid_plugin_hmm_lattice -target "${{ matrix.target.zig_target }}" tools/hmm_lattice_plugin.zig
          mkdir -p core/zig-out/lib
          case "${{ matrix.target.platform }}" in
            windows-*) cp nexaloid_plugin_hmm_lattice.dll core/zig-out/lib/nexaloid_plugin_hmm_lattice.dll ;;
            darwin-*) cp libnexaloid_plugin_hmm_lattice.dylib core/zig-out/lib/nexaloid_plugin_hmm_lattice.dylib ;;
            *) cp libnexaloid_plugin_hmm_lattice.so core/zig-out/lib/nexaloid_plugin_hmm_lattice.so ;;
          esac
      - name: Package native SDK
        shell: bash
        run: |
          for language in all c cpp zig; do
            python tools/package_native_sdk.py \
              --version "${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}" \
              --platform "${{ matrix.target.platform }}" \
              --language "$language"
          done
      - name: Upload native SDK artifact
        uses: actions/upload-artifact@v6
        with:
          name: native-sdk-${{ matrix.target.platform }}
          path: dist/native/*.zip

  github-release:
    name: Publish GitHub release assets
    if: github.event_name != 'workflow_dispatch' || inputs.publish_native_sdk
    runs-on: ubuntu-latest
    needs: native-sdk-build
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Download native SDK artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: native-sdk-*
          path: dist/native
          merge-multiple: true
      - name: Upload assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
        run: |
          case "$RELEASE_VERSION" in
            v*) RELEASE_TAG="$RELEASE_VERSION" ;;
            *) RELEASE_TAG="v$RELEASE_VERSION" ;;
          esac
          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" --title "$RELEASE_TAG" --generate-notes
          fi
          gh release upload "$RELEASE_TAG" dist/native/*.zip --clobber

  language-release-branches:
    name: Publish language release branches
    if: github.event_name != 'workflow_dispatch' || inputs.publish_native_sdk
    runs-on: ubuntu-latest
    needs: github-release
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Update release branches
        env:
          RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
        shell: bash
        run: |
          case "$RELEASE_VERSION" in
            v*) RELEASE_TAG="$RELEASE_VERSION" ;;
            *) RELEASE_TAG="v$RELEASE_VERSION" ;;
          esac

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          for language in c cpp zig; do
            tmp="$(mktemp -d)"
            python tools/stage_language_release_branch.py \
              --language "$language" \
              --version "$RELEASE_TAG" \
              --out-dir "$tmp"

            branch="release/$language"
            if git ls-remote --exit-code --heads origin "$branch" >/dev/null 2>&1; then
              git checkout -B "$branch" "origin/$branch"
            else
              git checkout --orphan "$branch"
            fi

            git rm -r -f --ignore-unmatch .
            find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
            cp -a "$tmp"/. .
            git add .

            if git diff --cached --quiet; then
              git commit --allow-empty -m "Release $language $RELEASE_TAG"
            else
              git commit -m "Release $language $RELEASE_TAG"
            fi

            git push origin HEAD:"$branch" --force
            git checkout "$GITHUB_SHA"
            rm -rf "$tmp"
          done

  cargo:
    name: Publish Cargo crates
    if: github.event_name != 'workflow_dispatch' || inputs.publish_cargo
    runs-on: ubuntu-latest
    needs: ci_gate
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Set up Zig
        uses: ./.github/actions/setup-zig
        with:
          version: 0.16.0
      - name: Set release version
        run: python tools/set_release_version.py "${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}"
      - name: Stage Cargo dictionary
        run: python -c "import pathlib, shutil; root=pathlib.Path.cwd(); dst=root/'bindings/rust/nexaloid-sys/data/dict'; dst.mkdir(parents=True, exist_ok=True); shutil.copy2(root/'data/dict/nexaloid.nxdict', dst/'nexaloid.nxdict')"
      - name: Set up Rust
        run: rustup toolchain install stable --profile minimal
      - name: Publish platform native crates
        shell: bash
        run: |
          sleep_for_rate_limit() {
            local log="$1"
            local retry_after
            local retry_epoch
            local now_epoch
            if ! grep -qi "Too Many Requests" "$log"; then
              return 1
            fi
            retry_after="$(sed -nE 's/.*try again after (.*) and see.*/\1/p' "$log" | tail -n1)"
            if [ -z "$retry_after" ]; then
              return 1
            fi
            retry_epoch="$(date -u -d "$retry_after" +%s 2>/dev/null || true)"
            now_epoch="$(date -u +%s)"
            if [ -z "$retry_epoch" ] || [ "$retry_epoch" -le "$now_epoch" ]; then
              return 1
            fi
            sleep $((retry_epoch - now_epoch + 15))
          }

          publish_crate() {
            local manifest="$1"
            local log
            for attempt in 1 2 3 4; do
              log="$(mktemp)"
              if cargo publish --allow-dirty --manifest-path "$manifest" >"$log" 2>&1; then
                cat "$log"
                rm -f "$log"
                return 0
              fi
              cat "$log"
              if grep -Eiq "already uploaded|already exists" "$log"; then
                rm -f "$log"
                return 0
              fi
              if sleep_for_rate_limit "$log"; then
                rm -f "$log"
                continue
              fi
              rm -f "$log"
              sleep $((attempt * 30))
            done
            return 1
          }

          for target in \
            linux-x64:x86_64-linux-gnu \
            windows-x64:x86_64-windows-gnu \
            darwin-x64:x86_64-macos \
            darwin-arm64:aarch64-macos \
            linux-arm64:aarch64-linux-gnu \
            windows-arm64:aarch64-windows-gnu \
            linux-musl:x86_64-linux-musl \
            linux-armv7:arm-linux-gnueabihf \
            riscv64:riscv64-linux-gnu
          do
            platform="${target%%:*}"
            zig_target="${target##*:}"
            rm -rf core/zig-out
            (cd core && zig build -Doptimize=ReleaseFast -Dtarget="$zig_target" --summary none)
            python tools/stage_assets.py --rust-platform-crate --platform "$platform"
            publish_crate "bindings/rust/nexaloid-sys-$platform/Cargo.toml"
          done
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Wait for platform crate index
        run: sleep 60
      - name: Publish nexaloid-sys crate
        run: |
          for attempt in 1 2 3; do
            log="$(mktemp)"
            if cargo publish --allow-dirty --manifest-path bindings/rust/nexaloid-sys/Cargo.toml >"$log" 2>&1; then
              cat "$log"
              rm -f "$log"
              exit 0
            fi
            cat "$log"
            if grep -Eiq "already uploaded|already exists" "$log"; then
              rm -f "$log"
              exit 0
            fi
            rm -f "$log"
            sleep $((attempt * 30))
          done
          exit 1
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Wait for nexaloid-sys index
        run: sleep 30
      - name: Publish nexaloid crate
        run: |
          for attempt in 1 2 3; do
            log="$(mktemp)"
            if cargo publish --allow-dirty --manifest-path bindings/rust/nexaloid/Cargo.toml >"$log" 2>&1; then
              cat "$log"
              rm -f "$log"
              exit 0
            fi
            cat "$log"
            if grep -Eiq "already uploaded|already exists" "$log"; then
              rm -f "$log"
              exit 0
            fi
            rm -f "$log"
            sleep $((attempt * 30))
          done
          exit 1
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  npm-build:
    name: Build npm prebuild (${{ matrix.target.platform }})
    if: github.event_name != 'workflow_dispatch' || inputs.publish_npm
    needs: ci_gate
    strategy:
      fail-fast: false
      matrix:
        target: *release-targets
    runs-on: ${{ matrix.target.os }}
    defaults:
      run:
        working-directory: bindings/node
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Set release version
        run: python ${{ github.workspace }}/tools/set_release_version.py "${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}"
      - name: Set up Zig
        uses: ./.github/actions/setup-zig
        with:
          version: 0.16.0
      - name: Build native library
        if: runner.os == 'Linux'
        run: zig build -Doptimize=ReleaseFast -Dtarget=${{ matrix.target.zig_target }}
        working-directory: ${{ github.workspace }}/core
      - name: Build native library
        if: runner.os != 'Linux'
        run: zig build -Doptimize=ReleaseFast
        working-directory: ${{ github.workspace }}/core
      - name: Build Node.js addon
        run: npm run build
      - name: Install packaging tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf
        working-directory: ${{ github.workspace }}
      - name: Stage Node.js prebuild
        run: python ${{ github.workspace }}/tools/stage_assets.py --node-addon
      - name: Regression test Node.js binding
        run: npm run test:binding
      - name: Upload npm prebuild
        uses: actions/upload-artifact@v6
        with:
          name: npm-${{ matrix.target.platform }}
          path: bindings/node/prebuilds

  npm:
    name: Publish npm package
    if: github.event_name != 'workflow_dispatch' || inputs.publish_npm
    runs-on: ubuntu-latest
    needs: npm-build
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: bindings/node
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Download npm prebuilds
        uses: actions/download-artifact@v7
        with:
          pattern: npm-*
          path: bindings/node/prebuilds
          merge-multiple: true
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Set release version
        run: python ${{ github.workspace }}/tools/set_release_version.py "${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}"
      - name: Stage npm dictionary
        run: python -c "import shutil, pathlib; root=pathlib.Path('${{ github.workspace }}'); dst=root/'bindings/node/data/dict'; dst.mkdir(parents=True, exist_ok=True); [shutil.copy2(root/'data/dict'/n, dst/n) for n in ('nexaloid.tsv', 'nexaloid.nxdict')]"
        working-directory: ${{ github.workspace }}
      - name: Check npm package contents
        run: npm pack --dry-run
      - name: Regression test Node.js binding
        run: npm run test:binding
      - name: Regression test packed npm package
        run: python ${{ github.workspace }}/tools/npm_package_regression.py
      - name: Publish to npm
        run: npm publish --provenance --access public

  release-summary:
    name: Write release summary
    runs-on: ubuntu-latest
    if: always()
    needs: [ci_gate, pypi, cargo, npm, github-release, language-release-branches]
    steps:
      - name: Write package results
        run: |
          {
            echo "## Release summary"
            echo ""
            echo "| Channel | Result |"
            echo "|---|---|"
            echo "| PyPI | ${{ needs.pypi.result }} |"
            echo "| Cargo | ${{ needs.cargo.result }} |"
            echo "| npm | ${{ needs.npm.result }} |"
            echo "| GitHub native SDK | ${{ needs.github-release.result }} |"
            echo "| Language release branches | ${{ needs.language-release-branches.result }} |"
            echo "| CI gate | ${{ needs.ci_gate.result }} |"
          } >> "$GITHUB_STEP_SUMMARY"
