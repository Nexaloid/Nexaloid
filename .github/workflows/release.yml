name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  pypi-build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - run: zig build
        working-directory: ${{ github.workspace }}/core
      - run: python -m pip install -U build
      - run: python ${{ github.workspace }}/tools/stage_assets.py
      - run: python -m build --wheel
        working-directory: bindings/python
      - uses: actions/upload-artifact@v6
        with:
          name: pypi-${{ runner.os }}
          path: bindings/python/dist/*

  pypi:
    runs-on: ubuntu-latest
    needs: pypi-build
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v6
        with:
          pattern: pypi-*
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

  cargo-native-build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - run: zig build
        working-directory: ${{ github.workspace }}/core
      - run: python tools/stage_assets.py
      - uses: actions/upload-artifact@v6
        with:
          name: cargo-native-${{ runner.os }}
          path: bindings/rust/nexaloid-sys/native/**

  cargo:
    runs-on: ubuntu-latest
    needs: cargo-native-build
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v6
        with:
          pattern: cargo-native-*
          path: bindings/rust/nexaloid-sys/native
          merge-multiple: true
      - run: rustup toolchain install stable --profile minimal
      - run: cargo publish --manifest-path bindings/rust/nexaloid-sys/Cargo.toml
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - run: sleep 30
      - run: cargo publish --manifest-path bindings/rust/nexaloid/Cargo.toml
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  npm-build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: bindings/node
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - run: zig build
        working-directory: ${{ github.workspace }}/core
      - run: npm run build
      - run: python ${{ github.workspace }}/tools/stage_assets.py --node-addon
      - uses: actions/upload-artifact@v6
        with:
          name: npm-${{ runner.os }}
          path: bindings/node/prebuilds/**

  npm:
    runs-on: ubuntu-latest
    needs: npm-build
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: bindings/node
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v6
        with:
          pattern: npm-*
          path: bindings/node/prebuilds
          merge-multiple: true
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - run: python -c "import shutil, pathlib; root=pathlib.Path('${{ github.workspace }}'); dst=root/'bindings/node/data/dict'; dst.mkdir(parents=True, exist_ok=True); [shutil.copy2(root/'data/dict'/n, dst/n) for n in ('nexaloid.tsv', 'nexaloid.nxdict')]"
        working-directory: ${{ github.workspace }}
      - run: npm publish --provenance --access public
